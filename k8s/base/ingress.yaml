apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: horizon-bot-docs
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    external-dns.alpha.kubernetes.io/target: lb-fsn-1.diamondforge.me
spec:
  ingressClassName: nginx-ic
  tls:
  - hosts:
    - docs.horizon-bot.me
    secretName: horizon-bot-docs-tls
  rules:
  - host: docs.horizon-bot.me
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: horizon-bot-docs
            port:
              number: 80
